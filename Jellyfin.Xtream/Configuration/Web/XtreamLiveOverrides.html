<div id="XtreamLivePage" data-role="page" class="page type-interior pluginConfigurationPage withTabs"
  data-require="emby-input,emby-button,emby-select" data-controller="__plugin/XtreamLiveOverrides.js">
  <style>
    .xtream-overrides-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 1em 0 1.5em;
    }
    .xtream-overrides-table thead th {
      text-align: left;
      padding: .6em .8em;
      font-size: .85em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: rgba(255,255,255,.6);
      border-bottom: 2px solid rgba(255,255,255,.1);
      white-space: nowrap;
    }
    .xtream-overrides-table tbody tr {
      transition: background .15s;
    }
    .xtream-overrides-table tbody tr:hover {
      background: rgba(255,255,255,.04);
    }
    .xtream-overrides-table tbody tr:nth-child(even) {
      background: rgba(255,255,255,.02);
    }
    .xtream-overrides-table tbody td {
      padding: .5em .6em;
      vertical-align: middle;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .xtream-overrides-table .col-num { width: 5em; }
    .xtream-overrides-table .col-name { width: 14em; }
    .xtream-overrides-table .col-logo { min-width: 10em; }
    .xtream-overrides-table .col-tz { width: 10em; }
    .xtream-overrides-table .col-src { width: 10em; }
    .xtream-overrides-table .col-xmltv { width: 14em; }
    .xtream-overrides-table td input[is="emby-input"],
    .xtream-overrides-table td select[is="emby-select"] {
      margin: 0 !important;
      padding: .35em .5em !important;
      font-size: .9em;
      width: 100%;
      box-sizing: border-box;
    }
    .xtream-overrides-table td .emby-input-label,
    .xtream-overrides-table td .emby-select-label,
    .xtream-overrides-table td .fieldDescription {
      display: none !important;
    }
    .xtream-overrides-table td .inputContainer,
    .xtream-overrides-table td .selectContainer {
      margin: 0 !important;
      padding: 0 !important;
    }
    .xtream-ch-label {
      display: block;
      font-size: .75em;
      color: rgba(255,255,255,.35);
      margin-top: .15em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
  <div data-role="content">
    <div class="content-primary">
      <form id="XtreamLiveOverridesForm">
        <div class="sectionTitleContainer flex align-items-center">
          <h2 class="sectionTitle">TV Channel Overrides</h2>
        </div>
        <p style="color:rgba(255,255,255,.5);margin:0 0 1em;font-size:.9em;">
          Customise channel number, name, logo, EPG timezone, and external EPG source per channel.
          Leave fields blank to keep defaults.
        </p>
        <div style="overflow-x:auto;">
          <table class="xtream-overrides-table">
            <thead>
              <tr>
                <th class="col-num">#</th>
                <th class="col-name">Name</th>
                <th class="col-logo">Logo URL</th>
                <th class="col-tz">EPG Timezone</th>
                <th class="col-src">EPG Source</th>
                <th class="col-xmltv">XMLTV Channel</th>
              </tr>
            </thead>
            <tbody id="LiveChannels">

            </tbody>
          </table>
        </div>
        <div style="margin-top:1em;">
          <button is="emby-button" type="submit" class="raised button-submit block emby-button">
            <span>Save</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
