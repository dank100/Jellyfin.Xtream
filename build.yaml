changelog: >
  Faster stream startup: (1) Multiplexer grace period keeps capture
  running 15 seconds after last viewer disconnects, so the
  open-probe-close-reopen cycle reuses existing segments instantly.
  (2) Reduced AnalyzeDurationMs from 3000 to 500 for live streams —
  pre-buffered data makes a 3-second probe unnecessary. Together these
  should eliminate the brief error Android TV shows before playback.
