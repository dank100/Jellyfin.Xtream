changelog: >
  Replace ffmpeg remuxer with in-process TsTimestampRewriter for zero-latency
  PTS/DTS/PCR normalization and continuity counter fixup. Wall-clock-based
  discontinuity adjustment prevents PTS drift during round-robin multiplexing.
  Null TS packet gap-fill keeps transcoder alive without backward timestamps.
  Add round-robin crash protection with error recovery. 13 unit tests.
