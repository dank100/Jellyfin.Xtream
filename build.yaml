changelog: >
  HLS direct play: serve live TV as HLS playlists with EXT-X-DISCONTINUITY
  markers for PTS jump handling. Enables direct play on Android TV, Samsung
  Tizen, LG webOS, and Xbox without any remux. Web clients get lossless
  remux (codec copy) automatically. Removed in-process TsTimestampRewriter
  and WrappedBufferStream pipe — simplified to pure HLS segment serving.
  Fixed stale playlist bug causing replay when all segments are pruned.
  Added 6 ChannelBuffer unit tests for replay detection and playlist correctness.
