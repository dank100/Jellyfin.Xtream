changelog: >
  Channel probe feature: probe button on Live TV channel selection shows
  codec, resolution, framerate, audio codec, and direct play compatibility
  per client (Android TV, Samsung Tizen, LG webOS, Xbox, Web). Pre-buffer
  fix for Restream.Open() waits for 256KB of data before returning so
  Jellyfin's stream probe gets real video properties (fixes Height:0 /
  Level:-99 probe failures that prevented direct play on Android TV).
  Keyframe-aligned segment splitting for clean HLS playback.
